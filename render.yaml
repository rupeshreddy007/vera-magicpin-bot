services:
  - type: web
    name: vera-magicpin-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn bot_server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
    healthCheckPath: /v1/healthz
    plan: free
